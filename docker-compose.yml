services:
  # ── MongoDB: State Layer ──
  # Persists data even if the container is destroyed
  mongo:
    image: mongo:7
    container_name: agenticai-mongo
    restart: unless-stopped
    ports:
      - "27018:27017" # Mapping 27018 on host to 27017 in container
    volumes:
      - mongo-data:/data/db # Named volume for persistence

  # ── Node.js App: Application Layer ──
  app:
    build: .
    container_name: agenticai-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/loginpage
      SESSION_SECRET: change-me-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      GROQ_API_KEY: ${GROQ_API_KEY}

volumes:
  mongo-data:
